<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Financiero Empresarial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
transition:0.3s;
}

/* MODO CLARO */

body.light{
background:#f5f7fb;
color:black;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar select,button{
width:100%;
margin-top:10px;
padding:8px;
border:none;
border-radius:6px;
}

/* CONTENIDO */

.main{
margin-left:240px;
padding:40px;
}

h1{
margin-top:0;
}

/* KPI */

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

body.light .card{
background:white;
}

.card:hover{
transform:scale(1.05);
}

.kpi{
font-size:28px;
font-weight:bold;
}

/* GRAFICAS */

.chart{
margin-bottom:40px;
background:#1e293b;
padding:25px;
border-radius:10px;
}

body.light .chart{
background:white;
}

/* ANALISIS */

.analisis{
background:#1e293b;
padding:30px;
border-radius:10px;
line-height:1.6;
}

body.light .analisis{
background:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Dashboard</h2>

<label>Año</label>

<select id="year">
<option value="0">2022</option>
<option value="1">2023</option>
<option value="2">2024</option>
<option value="3">2025</option>
</select>

<button onclick="modo()">Modo claro/oscuro</button>

</div>

<div class="main">

<h1>Dashboard Financiero Empresarial</h1>

<!-- KPI -->

<div class="kpis">

<div class="card">
Activos
<div class="kpi" id="activos"></div>
</div>

<div class="card">
Pasivos
<div class="kpi" id="pasivos"></div>
</div>

<div class="card">
Capital
<div class="kpi" id="capital"></div>
</div>

<div class="card">
Liquidez
<div class="kpi" id="liquidez"></div>
</div>

<div class="card">
Autonomía
<div class="kpi" id="autonomia"></div>
</div>

<div class="card">
Endeudamiento
<div class="kpi" id="endeuda"></div>
</div>

<div class="card">
ROI
<div class="kpi">12%</div>
</div>

<div class="card">
ROE
<div class="kpi">18%</div>
</div>

</div>

<!-- GRAFICAS UNA DEBAJO DE OTRA -->

<div class="chart"><canvas id="g1"></canvas></div>
<div class="chart"><canvas id="g2"></canvas></div>
<div class="chart"><canvas id="g3"></canvas></div>
<div class="chart"><canvas id="g4"></canvas></div>
<div class="chart"><canvas id="g5"></canvas></div>
<div class="chart"><canvas id="g6"></canvas></div>
<div class="chart"><canvas id="g7"></canvas></div>
<div class="chart"><canvas id="g8"></canvas></div>
<div class="chart"><canvas id="g9"></canvas></div>
<div class="chart"><canvas id="g10"></canvas></div>
<div class="chart"><canvas id="g11"></canvas></div>
<div class="chart"><canvas id="g12"></canvas></div>
<div class="chart"><canvas id="g13"></canvas></div>
<div class="chart"><canvas id="g14"></canvas></div>
<div class="chart"><canvas id="g15"></canvas></div>

<!-- ANALISIS -->

<div class="analisis" id="interpretacion"></div>

</div>

<script>

/* DATOS */

const años=["2022","2023","2024","2025"]

const activos=[7110,7470,7240,7270]
const pasivos=[2270,2330,2105,2020]
const capital=[4840,5140,5135,5250]

const inventarios=[900,950,1000,1050]
const cuentas=[700,800,900,770]
const efectivo=[430,480,510,550]

function actualizar(a){

document.getElementById("activos").innerHTML=activos[a]
document.getElementById("pasivos").innerHTML=pasivos[a]
document.getElementById("capital").innerHTML=capital[a]

let liquidez=(inventarios[a]+cuentas[a]+efectivo[a])/pasivos[a]
let autonomia=capital[a]/activos[a]
let endeuda=pasivos[a]/activos[a]

document.getElementById("liquidez").innerHTML=liquidez.toFixed(2)
document.getElementById("autonomia").innerHTML=autonomia.toFixed(2)
document.getElementById("endeuda").innerHTML=endeuda.toFixed(2)

document.getElementById("interpretacion").innerHTML=
"<h2>Análisis financiero</h2><p>La empresa mantiene estabilidad en sus activos durante el periodo analizado. El endeudamiento se reduce hacia 2025, lo que fortalece la estructura financiera. La liquidez muestra que la empresa puede cubrir sus obligaciones de corto plazo.</p>"

}

actualizar(3)

document.getElementById("year").addEventListener("change",function(){
actualizar(this.value)
})

function modo(){
document.body.classList.toggle("light")
}

/* FUNCION GRAFICAS */

function crear(id,label,data,type="bar"){
new Chart(document.getElementById(id),{
type:type,
data:{
labels:años,
datasets:[{label:label,data:data}]
},
options:{
animation:{duration:1500}
}
})
}

/* CREAR 15 GRAFICAS */

crear("g1","Activos",activos)
crear("g2","Pasivos",pasivos)
crear("g3","Capital",capital)
crear("g4","Inventarios",inventarios)
crear("g5","Cuentas por cobrar",cuentas)
crear("g6","Efectivo",efectivo)

crear("g7","Activos tendencia",activos,"line")
crear("g8","Pasivos tendencia",pasivos,"line")
crear("g9","Capital tendencia",capital,"line")

crear("g10","Inventarios tendencia",inventarios,"line")
crear("g11","Cuentas tendencia",cuentas,"line")
crear("g12","Efectivo tendencia",efectivo,"line")

crear("g13","Activos comparativo",activos)
crear("g14","Pasivos comparativo",pasivos)
crear("g15","Capital comparativo",capital)

</script>

</body>
</html>
